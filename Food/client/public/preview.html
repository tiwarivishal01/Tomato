<!DOCTYPE html>
<html>
<head>
  <style>
    body { display: flex; flex-wrap: wrap; background: white; font-family: sans-serif; }
    .box { border: 2px solid black; margin: 10px; width: 300px; text-align: center; padding: 10px; }
    img { width: 100%; height: 200px; object-fit: cover; }
    h1 { font-size: 30px; color: red; margin: 5px 0; }
  </style>
</head>
<body>
  <script>
    for(let i=1; i<=25; i++) {
        let ext = i===14 ? 'webp' : 'avif';
        document.write(`<div class="box"><h1>Image ID: ${i}</h1><img src="/src/assets/image${i}.${ext}" /></div>`);
    }
  </script>
</body>
</html>
